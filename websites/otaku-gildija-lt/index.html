<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Otaku Nexus | Anime Library & Guild</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="The ultimate gamified anime library manager. Track watch history, earn badges, and join the Otaku Guild. Available in LT and EU." />
    <meta name="keywords" content="anime library, otaku gildija, anime tracker, video organizer, gamified anime list" />
    <meta property="og:title" content="Otaku Nexus - Choose Your Reality" />
    <meta property="og:description" content="Organize your anime collection and level up your otaku profile." />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#7c3aed" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
              mono: ['Exo 2', 'monospace'], // Tech/Anime UI font
            },
            colors: {
              gray: {
                900: '#0f0e17', // Darker, slightly purple-tinted black
                800: '#1a1a2e',
                700: '#2e2e4d',
              },
              violet: {
                500: '#8b5cf6',
                600: '#7c3aed',
                900: '#4c1d95',
              },
              pink: {
                500: '#ec4899',
                600: '#db2777',
              }
            },
            backgroundImage: {
              'anime-grid': "radial-gradient(circle, rgba(124, 58, 237, 0.1) 1px, transparent 1px)",
              'manga-dots': "radial-gradient(rgba(255,255,255,0.1) 1px, transparent 0)",
            },
            animation: {
                'blob': "blob 7s infinite",
            },
            keyframes: {
                blob: {
                    "0%": { transform: "translate(0px, 0px) scale(1)" },
                    "33%": { transform: "translate(30px, -50px) scale(1.1)" },
                    "66%": { transform: "translate(-20px, 20px) scale(0.9)" },
                    "100%": { transform: "translate(0px, 0px) scale(1)" }
                }
            }
          }
        }
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "firebase/": "https://aistudiocdn.com/firebase@^12.6.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0"
  }
}
</script>
<style>
  body {
    background-color: #0f0e17;
    background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0f0e17 100%);
  }
  /* Anime-style scrollbar */
  ::-webkit-scrollbar {
    width: 8px;
  }
  ::-webkit-scrollbar-track {
    background: #0f0e17; 
  }
  ::-webkit-scrollbar-thumb {
    background: #4c1d95; 
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: #7c3aed; 
  }
  
  /* 3D Perspective Utilities */
  .perspective-1000 {
    perspective: 1000px;
  }
</style>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-gray-900 text-white antialiased font-sans">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
