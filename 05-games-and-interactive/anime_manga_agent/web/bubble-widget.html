<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeManga Agent - Bubble Widget</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow: hidden;
        }
        
        /* ============================================
           FLOATING BUBBLE AGENT
           ============================================ */
        
        .agent-bubble {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 8px 25px rgba(233, 69, 96, 0.4);
            transition: all 0.3s ease;
            z-index: 10000;
            animation: bubblePulse 2s infinite;
        }
        
        .agent-bubble:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 35px rgba(233, 69, 96, 0.6);
        }
        
        .agent-bubble.active {
            animation: none;
        }
        
        @keyframes bubblePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        /* Notification badge */
        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 24px;
            height: 24px;
            background: #ffd700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: #1a1a2e;
            animation: badgeBounce 0.5s ease;
        }
        
        @keyframes badgeBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        /* ============================================
           SMS-STYLE NOTIFICATIONS
           ============================================ */
        
        .sms-container {
            position: fixed;
            bottom: 120px;
            right: 30px;
            width: 320px;
            max-height: 400px;
            display: flex;
            flex-direction: column-reverse;
            gap: 10px;
            z-index: 9999;
            pointer-events: none;
        }
        
        .sms-bubble {
            background: linear-gradient(135deg, #1b2838, #2a3f5f);
            border-radius: 20px 20px 5px 20px;
            padding: 12px 16px;
            color: #fff;
            font-size: 14px;
            line-height: 1.4;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            animation: smsSlideIn 0.4s ease;
            pointer-events: auto;
            position: relative;
            max-width: 280px;
            margin-left: auto;
        }
        
        .sms-bubble::before {
            content: '🎌';
            position: absolute;
            left: -35px;
            bottom: 0;
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        
        .sms-bubble.important {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border-radius: 20px 20px 5px 20px;
        }
        
        .sms-bubble.celebration {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
        }
        
        .sms-bubble .timestamp {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 5px;
            text-align: right;
        }
        
        @keyframes smsSlideIn {
            from {
                opacity: 0;
                transform: translateX(50px) scale(0.8);
            }
            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }
        
        .sms-bubble.fade-out {
            animation: smsFadeOut 0.3s ease forwards;
        }
        
        @keyframes smsFadeOut {
            to {
                opacity: 0;
                transform: translateX(50px) scale(0.8);
            }
        }
        
        /* ============================================
           PHONE-STYLE CHAT WINDOW
           ============================================ */
        
        .phone-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 380px;
            height: 600px;
            background: #0d1b2a;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
            display: none;
            flex-direction: column;
            z-index: 10001;
            border: 3px solid #2a3f5f;
        }
        
        .phone-container.active {
            display: flex;
            animation: phoneSlideUp 0.4s ease;
        }
        
        @keyframes phoneSlideUp {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        /* Phone notch */
        .phone-notch {
            width: 150px;
            height: 30px;
            background: #0d1b2a;
            border-radius: 0 0 20px 20px;
            margin: 0 auto;
            position: relative;
        }
        
        .phone-notch::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 5px;
            background: #2a3f5f;
            border-radius: 3px;
        }
        
        /* Phone header */
        .phone-header {
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .phone-header .avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
        
        .phone-header .info h3 {
            color: #fff;
            font-size: 16px;
            margin-bottom: 2px;
        }
        
        .phone-header .info p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 11px;
        }
        
        .phone-header .close-btn {
            margin-left: auto;
            width: 35px;
            height: 35px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        
        .phone-header .close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        /* Phone chat area */
        .phone-chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .phone-chat::-webkit-scrollbar {
            width: 4px;
        }
        
        .phone-chat::-webkit-scrollbar-thumb {
            background: #e94560;
            border-radius: 2px;
        }
        
        .chat-message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            animation: messageIn 0.3s ease;
        }
        
        @keyframes messageIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .chat-message.agent {
            background: linear-gradient(135deg, #1b2838, #2a3f5f);
            color: #fff;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }
        
        .chat-message.user {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }
        
        .chat-message .time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 5px;
        }
        
        /* Quick actions */
        .quick-actions {
            padding: 10px 20px;
            background: #1b2838;
            display: flex;
            gap: 8px;
            overflow-x: auto;
        }
        
        .quick-actions button {
            padding: 8px 14px;
            border: none;
            border-radius: 18px;
            background: linear-gradient(135deg, #2a3f5f, #3a5f8f);
            color: #fff;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        
        .quick-actions button:hover {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
        }
        
        /* Phone input */
        .phone-input {
            padding: 15px 20px;
            background: #1b2838;
            border-top: 1px solid #2a3f5f;
        }
        
        .phone-input .input-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #0d1b2a;
            border-radius: 25px;
            padding: 5px 15px;
            border: 2px solid #2a3f5f;
        }
        
        .phone-input .input-wrapper:focus-within {
            border-color: #e94560;
        }
        
        .phone-input input {
            flex: 1;
            padding: 10px 0;
            border: none;
            background: transparent;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        
        .phone-input input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        .phone-input button {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        
        .phone-input button:hover {
            transform: scale(1.05);
        }
        
        /* ============================================
           ACTIVITY TRACKER (for demo)
           ============================================ */
        
        .activity-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(13, 27, 42, 0.95);
            border-radius: 16px;
            padding: 20px;
            width: 300px;
            border: 1px solid #2a3f5f;
            z-index: 100;
        }
        
        .activity-panel h3 {
            color: #e94560;
            font-size: 14px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .activity-btn {
            display: block;
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 10px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #1b2838, #2a3f5f);
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }
        
        .activity-btn:hover {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            transform: translateX(5px);
        }
        
        .activity-btn span {
            opacity: 0.7;
            font-size: 11px;
            display: block;
            margin-top: 3px;
        }
    </style>
</head>
<body>
    <!-- Activity Panel (Demo Controls) -->
    <div class="activity-panel">
        <h3>🎮 Simulate User Activity</h3>
        <button class="activity-btn" onclick="simulateActivity('add_watchlist')">
            ➕ Add to Watchlist
            <span>Triggers: "Oh nice! Added to your list!"</span>
        </button>
        <button class="activity-btn" onclick="simulateActivity('complete_anime')">
            ✅ Complete an Anime
            <span>Triggers: Celebration message</span>
        </button>
        <button class="activity-btn" onclick="simulateActivity('rate_anime')">
            ⭐ Rate an Anime
            <span>Triggers: Opinion response</span>
        </button>
        <button class="activity-btn" onclick="simulateActivity('browse_seasonal')">
            📅 Browse Seasonal
            <span>Triggers: Recommendation</span>
        </button>
        <button class="activity-btn" onclick="simulateActivity('search_anime')">
            🔍 Search for Anime
            <span>Triggers: Search tip</span>
        </button>
        <button class="activity-btn" onclick="simulateActivity('idle')">
            😴 User Idle
            <span>Triggers: Random engagement</span>
        </button>
    </div>
    
    <!-- SMS Notification Container -->
    <div class="sms-container" id="smsContainer"></div>
    
    <!-- Floating Bubble Agent -->
    <div class="agent-bubble" id="agentBubble" onclick="togglePhone()">
        🎌
        <div class="notification-badge" id="notifBadge" style="display: none;">0</div>
    </div>
    
    <!-- Phone-Style Chat Window -->
    <div class="phone-container" id="phoneContainer">
        <div class="phone-notch"></div>
        
        <div class="phone-header">
            <div class="avatar">🎌</div>
            <div class="info">
                <h3>Otaku Sensei</h3>
                <p>Your Anime & Manga Guide • Online</p>
            </div>
            <button class="close-btn" onclick="togglePhone()">✕</button>
        </div>
        
        <div class="phone-chat" id="phoneChat">
            <div class="chat-message agent">
                Hey there! 👋 I'm your personal anime guide. I'll keep you updated on your activity and give you recommendations!
                <div class="time">Just now</div>
            </div>
        </div>
        
        <div class="quick-actions">
            <button onclick="sendQuickMessage('Recommend something')">🎬 Recommend</button>
            <button onclick="sendQuickMessage('Whats trending')">🔥 Trending</button>
            <button onclick="sendQuickMessage('My watchlist')">📚 Watchlist</button>
            <button onclick="sendQuickMessage('Hot take')">🔥 Hot Take</button>
        </div>
        
        <div class="phone-input">
            <div class="input-wrapper">
                <input type="text" id="phoneInput" placeholder="Ask me anything..." onkeypress="if(event.key==='Enter')sendMessage()">
                <button onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // STATE MANAGEMENT
        // ============================================
        
        let isPhoneOpen = false;
        let notificationCount = 0;
        let smsQueue = [];
        let lastActivity = Date.now();
        let idleTimer = null;
        
        // Activity-based responses
        const activityResponses = {
            add_watchlist: [
                "Oh nice! 📝 I see you added something to your watchlist! Great choice~",
                "Ooh, adding to the list! 👀 I approve of your taste!",
                "Another one for the watchlist! 🎯 You're building quite the collection!",
                "Added! ✨ I'll remind you when it starts airing!",
                "Nice pick! 📚 That one's been getting good reviews lately!"
            ],
            complete_anime: [
                "🎉 CONGRATS! You finished it! How was the ending?!",
                "✅ Another one completed! You're on a roll! 🔥",
                "Finished already?! 😱 That was fast! Must've been good!",
                "🏆 Achievement unlocked: Anime completed! What's next?",
                "Done! 🎊 Now you can finally avoid spoilers in peace!"
            ],
            rate_anime: [
                "Ooh, a rating! 🌟 I'm curious what you thought!",
                "⭐ Rating time! Did it live up to the hype?",
                "Interesting rating! 🤔 I might have some opinions about that...",
                "Thanks for rating! 📊 Helps me recommend better stuff!",
                "Noted! ✍️ Your taste is becoming clearer to me~"
            ],
            browse_seasonal: [
                "📅 Checking out this season? There's some GEMS in there!",
                "Seasonal browsing! 🌸 Want me to highlight the must-watches?",
                "Oh, looking at what's airing? 📺 I have opinions!",
                "This season is STACKED! 🔥 Need recommendations?",
                "Browsing the seasonal chart? 📊 Let me know if you need help!"
            ],
            search_anime: [
                "🔍 Searching for something specific? I can help!",
                "Looking for something? 👀 Try describing what you want!",
                "Search tip: 💡 You can describe vibes like 'dark revenge saga'!",
                "Need help finding something? 🎯 I'm great at vague descriptions!",
                "Searching? 🔎 Tell me what mood you're in!"
            ],
            idle: [
                "Hey, you still there? 👋 Want a random recommendation?",
                "Getting bored? 😏 Let me tell you about my waifu...",
                "Psst... 🤫 Want to hear a hot take?",
                "You know what you should watch? 🎬 Let me tell you!",
                "Idle hands... 😈 Perfect time for anime recommendations!",
                "Don't just sit there! 🎌 Let's find your next obsession!",
                "Fun fact: 📚 Did you know Eiichiro Oda has been drawing One Piece for 25+ years?",
                "Random thought: 🤔 My rival Satoshi would probably drop this conversation by now..."
            ]
        };
        
        // ============================================
        // SMS NOTIFICATION SYSTEM
        // ============================================
        
        function showSMS(message, type = 'normal') {
            const container = document.getElementById('smsContainer');
            const sms = document.createElement('div');
            sms.className = `sms-bubble ${type}`;
            
            const now = new Date();
            const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            sms.innerHTML = `
                ${message}
                <div class="timestamp">${time}</div>
            `;
            
            container.appendChild(sms);
            
            // Update notification badge if phone is closed
            if (!isPhoneOpen) {
                notificationCount++;
                updateBadge();
            }
            
            // Auto-remove after 8 seconds
            setTimeout(() => {
                sms.classList.add('fade-out');
                setTimeout(() => sms.remove(), 300);
            }, 8000);
            
            // Limit to 3 visible SMS
            const allSms = container.querySelectorAll('.sms-bubble:not(.fade-out)');
            if (allSms.length > 3) {
                allSms[0].classList.add('fade-out');
                setTimeout(() => allSms[0].remove(), 300);
            }
        }
        
        function updateBadge() {
            const badge = document.getElementById('notifBadge');
            if (notificationCount > 0) {
                badge.style.display = 'flex';
                badge.textContent = notificationCount > 9 ? '9+' : notificationCount;
            } else {
                badge.style.display = 'none';
            }
        }
        
        // ============================================
        // PHONE CHAT SYSTEM
        // ============================================
        
        function togglePhone() {
            const phone = document.getElementById('phoneContainer');
            const bubble = document.getElementById('agentBubble');
            
            isPhoneOpen = !isPhoneOpen;
            
            if (isPhoneOpen) {
                phone.classList.add('active');
                bubble.classList.add('active');
                bubble.style.display = 'none';
                notificationCount = 0;
                updateBadge();
            } else {
                phone.classList.remove('active');
                bubble.classList.remove('active');
                bubble.style.display = 'flex';
            }
        }
        
        function addChatMessage(message, isAgent = true) {
            const chat = document.getElementById('phoneChat');
            const msgDiv = document.createElement('div');
            msgDiv.className = `chat-message ${isAgent ? 'agent' : 'user'}`;
            
            const now = new Date();
            const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            msgDiv.innerHTML = `
                ${message}
                <div class="time">${time}</div>
            `;
            
            chat.appendChild(msgDiv);
            chat.scrollTop = chat.scrollHeight;
        }
        
        function sendMessage() {
            const input = document.getElementById('phoneInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            addChatMessage(message, false);
            input.value = '';
            
            // Simulate typing
            setTimeout(() => {
                const response = generateResponse(message);
                addChatMessage(response, true);
            }, 1000);
        }
        
        function sendQuickMessage(message) {
            addChatMessage(message, false);
            
            setTimeout(() => {
                const response = generateResponse(message);
                addChatMessage(response, true);
            }, 1000);
        }
        
        function generateResponse(message) {
            const lower = message.toLowerCase();
            
            if (lower.includes('recommend')) {
                return "🎬 Based on your taste, I'd recommend checking out Vinland Saga! It's got epic action, deep characters, and a revenge arc that'll blow your mind! 🔥";
            }
            if (lower.includes('trending')) {
                return "🔥 Right now, Frieren: Beyond Journey's End is DOMINATING! Also Jujutsu Kaisen S2 and Apothecary Diaries are getting tons of love!";
            }
            if (lower.includes('watchlist')) {
                return "📚 Your watchlist is looking good! You've got 12 anime queued up. Want me to prioritize them based on what's airing?";
            }
            if (lower.includes('hot take')) {
                return "🔥 HOT TAKE: Dragon Ball Z is overrated - great for its time but hasn't aged well. Come at me! 💪";
            }
            if (lower.includes('waifu')) {
                return "🎀 My one true waifu is Mikasa Ackerman from Attack on Titan! Her strength, loyalty, and character arc are PERFECTION. No debates! 💅";
            }
            
            return "🎌 I'm here to help! Ask me for recommendations, trending anime, or just chat about your favorites! What's on your mind?";
        }
        
        // ============================================
        // ACTIVITY SIMULATION
        // ============================================
        
        function simulateActivity(type) {
            lastActivity = Date.now();
            
            const responses = activityResponses[type];
            const message = responses[Math.floor(Math.random() * responses.length)];
            
            let smsType = 'normal';
            if (type === 'complete_anime') smsType = 'celebration';
            if (type === 'idle') smsType = 'important';
            
            showSMS(message, smsType);
            
            // Also add to chat if phone is open
            if (isPhoneOpen) {
                addChatMessage(message, true);
            }
        }
        
        // ============================================
        // IDLE DETECTION
        // ============================================
        
        function startIdleDetection() {
            // Check every 30 seconds
            idleTimer = setInterval(() => {
                const idleTime = Date.now() - lastActivity;
                
                // If idle for more than 2 minutes, send a message
                if (idleTime > 120000) {
                    simulateActivity('idle');
                    lastActivity = Date.now(); // Reset to avoid spam
                }
            }, 30000);
        }
        
        // Track user activity
        document.addEventListener('mousemove', () => lastActivity = Date.now());
        document.addEventListener('keypress', () => lastActivity = Date.now());
        document.addEventListener('click', () => lastActivity = Date.now());
        
        // ============================================
        // INITIALIZATION
        // ============================================
        
        // Start idle detection
        startIdleDetection();
        
        // Welcome message after 2 seconds
        setTimeout(() => {
            showSMS("Hey! 👋 I'm your anime guide! I'll keep you updated on your activity~", 'important');
        }, 2000);
        
        // Random engagement after 10 seconds
        setTimeout(() => {
            showSMS("Psst... 🤫 Click on me to chat! I have recommendations!", 'normal');
        }, 10000);
    </script>
</body>
</html>
