<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otaku Sensei - Chat</title>
    <style>
        :root {
            --primary: #e94560;
            --primary-light: #ff6b6b;
            --primary-dark: #c73e54;
            --accent: #ffd700;
            
            --bg-primary: #0d1b2a;
            --bg-secondary: #1b2838;
            --bg-tertiary: #16213e;
            --bg-input: #0a1420;
            
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.5);
            
            --bubble-agent: #1b2838;
            --bubble-user: linear-gradient(135deg, #e94560, #ff6b6b);
            
            --border: #2a3f5f;
            --border-focus: #e94560;
            
            --success: #4ade80;
            --error: #f87171;
            --warning: #fbbf24;
            
            --shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.3);
            
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
            --radius-xs: 8px;
            
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #0d1b2a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        
        .phone-frame {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 850px;
            background: var(--bg-primary);
            border-radius: 40px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow), inset 0 0 0 2px rgba(255,255,255,0.1);
            position: relative;
        }
        
        .phone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 28px;
            background: var(--bg-primary);
            border-radius: 0 0 20px 20px;
            z-index: 100;
        }
        
        .header {
            padding: 40px 20px 15px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent), #ff8c00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            position: relative;
        }
        
        .avatar::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: var(--success);
            border: 2px solid var(--bg-secondary);
            border-radius: 50%;
        }
        
        .agent-info {
            display: flex;
            flex-direction: column;
        }
        
        .agent-name {
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 600;
        }
        
        .agent-status {
            color: var(--success);
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .agent-status::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .header-actions {
            display: flex;
            gap: 8px;
        }
        
        .header-btn {
            width: 36px;
            height: 36px;
            background: var(--bg-tertiary);
            border: none;
            border-radius: 50%;
            color: var(--text-secondary);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        
        .header-btn:hover {
            background: var(--primary);
            color: var(--text-primary);
            transform: scale(1.05);
        }
        
        .nav-tabs {
            display: flex;
            background: var(--bg-secondary);
            padding: 0 10px;
            gap: 4px;
            border-bottom: 1px solid var(--border);
        }
        
        .nav-tab {
            flex: 1;
            padding: 12px 8px;
            text-align: center;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            border-bottom: 2px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        
        .nav-tab span {
            font-size: 18px;
        }
        
        .nav-tab:hover {
            color: var(--text-secondary);
            background: rgba(255,255,255,0.05);
        }
        
        .nav-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            background: rgba(233, 69, 96, 0.1);
        }
        
        .panel {
            display: none;
            background: var(--bg-secondary);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            animation: slideDown 0.3s ease;
        }
        
        .panel.active {
            display: block;
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .quick-actions {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0;
            scrollbar-width: none;
        }
        
        .quick-actions::-webkit-scrollbar {
            display: none;
        }
        
        .quick-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .quick-btn:hover {
            background: var(--primary);
            color: var(--text-primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }
        
        .quick-btn.primary {
            background: var(--primary);
            color: var(--text-primary);
        }
        
        .quick-btn.primary:hover {
            background: var(--primary-light);
        }
        
        .panel-title {
            color: var(--text-muted);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }
        
        .chat-area::-webkit-scrollbar {
            width: 4px;
        }
        
        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .chat-area::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 2px;
        }
        
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
            animation: messageIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes messageIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .message.agent {
            background: var(--bubble-agent);
            color: var(--text-primary);
            align-self: flex-start;
            border-bottom-left-radius: 6px;
        }
        
        .message.user {
            background: var(--bubble-user);
            color: var(--text-primary);
            align-self: flex-end;
            border-bottom-right-radius: 6px;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }
        
        .message .time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .message.user .time {
            justify-content: flex-end;
        }
        
        .message-status {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            opacity: 0.8;
            margin-top: 4px;
        }
        
        .result-card {
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            padding: 14px;
            margin-top: 8px;
            border-left: 3px solid var(--primary);
            animation: messageIn 0.4s ease;
        }
        
        .result-card h4 {
            color: var(--text-primary);
            font-size: 14px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .result-card .score {
            color: var(--accent);
            font-weight: 700;
            font-size: 13px;
        }
        
        .result-card p {
            color: var(--text-secondary);
            font-size: 12px;
            margin: 4px 0;
        }
        
        .result-card .tags {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        
        .result-card .tag {
            padding: 3px 10px;
            background: var(--bg-secondary);
            border-radius: 12px;
            font-size: 10px;
            color: var(--text-muted);
        }
        
        .typing {
            display: none;
            padding: 12px 16px;
            background: var(--bubble-agent);
            border-radius: 20px;
            align-self: flex-start;
            border-bottom-left-radius: 6px;
            margin: 0 16px 12px;
        }
        
        .typing.active {
            display: flex;
            gap: 4px;
            animation: messageIn 0.3s ease;
        }
        
        .typing span {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        
        .typing span:nth-child(1) { animation-delay: 0s; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-8px); }
        }
        
        .input-area {
            padding: 12px 16px 16px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
        }
        
        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-input);
            border-radius: 24px;
            padding: 6px 8px 6px 16px;
            border: 1px solid var(--border);
            transition: var(--transition);
        }
        
        .input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.15);
        }
        
        .input-wrapper input {
            flex: 1;
            padding: 8px 0;
            border: none;
            background: transparent;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
        }
        
        .input-wrapper input::placeholder {
            color: var(--text-muted);
        }
        
        .input-actions {
            display: flex;
            gap: 4px;
        }
        
        .input-btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            background: transparent;
            color: var(--text-muted);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        
        .input-btn:hover {
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }
        
        .send-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 50%;
            background: var(--primary);
            color: var(--text-primary);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        
        .send-btn:hover {
            background: var(--primary-light);
            transform: scale(1.05);
        }
        
        .send-btn:active {
            transform: scale(0.95);
        }
        
        .quick-reply {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 8px 0;
            scrollbar-width: none;
        }
        
        .quick-reply::-webkit-scrollbar {
            display: none;
        }
        
        .quick-reply-btn {
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition);
        }
        
        .quick-reply-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(233, 69, 96, 0.1);
        }
        
        .floating-actions {
            position: absolute;
            right: 16px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 50;
        }
        
        .fab {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-sm), 0 4px 20px rgba(233, 69, 96, 0.4);
            transition: var(--transition);
        }
        
        .fab:hover {
            transform: scale(1.1);
            background: var(--primary-light);
        }
        
        .online-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }
        
        .section-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 8px 0;
        }
        
        .section-divider::before,
        .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        
        .section-divider span {
            color: var(--text-muted);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        @media (max-height: 700px) {
            .phone-frame {
                max-height: 100vh;
                border-radius: 24px;
            }
            
            .header {
                padding: 32px 16px 10px;
            }
            
            .message {
                padding: 10px 14px;
            }
        }
        
        /* Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            background: var(--bg-tertiary);
            font-size: 10px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }
        
        .status-bar .time {
            font-weight: 600;
        }
        
        .status-bar .icons {
            display: flex;
            gap: 6px;
        }
        
        .connection-status {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
        }
        
        .connection-status .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
        }
        
        .connection-status.offline .dot {
            background: var(--error);
        }
        
        /* Pull to refresh */
        .pull-refresh {
            text-align: center;
            padding: 10px;
            color: var(--text-muted);
            font-size: 12px;
            display: none;
        }
        
        .pull-refresh.active {
            display: block;
        }
        
        /* Skeleton loading */
        .skeleton {
            background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--bg-secondary) 50%, var(--bg-tertiary) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .skeleton-message {
            height: 60px;
            margin: 8px 16px;
        }
        
        /* Message actions */
        .message-actions {
            display: none;
            position: absolute;
            top: -30px;
            right: 0;
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 4px;
            box-shadow: var(--shadow-sm);
            gap: 4px;
            z-index: 10;
        }
        
        .message:hover .message-actions {
            display: flex;
        }
        
        .message-action-btn {
            width: 24px;
            height: 24px;
            border: none;
            border-radius: 50%;
            background: var(--bg-tertiary);
            color: var(--text-muted);
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .message-action-btn:hover {
            background: var(--primary);
            color: var(--text-primary);
        }
        
        .message {
            position: relative;
        }
        
        /* Emoji picker */
        .emoji-picker {
            position: absolute;
            bottom: 60px;
            left: 16px;
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 10px;
            display: none;
            flex-wrap: wrap;
            gap: 8px;
            max-width: 250px;
            box-shadow: var(--shadow);
            z-index: 100;
        }
        
        .emoji-picker.active {
            display: flex;
        }
        
        .emoji-picker button {
            font-size: 20px;
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .emoji-picker button:hover {
            transform: scale(1.2);
        }
        
        /* Notification badge */
        .nav-tab .badge {
            position: absolute;
            top: 4px;
            right: 50%;
            transform: translateX(8px);
            width: 16px;
            height: 16px;
            background: var(--error);
            border-radius: 50%;
            font-size: 9px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        /* Share button */
        .share-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: var(--shadow-sm), 0 4px 20px rgba(233, 69, 96, 0.4);
            transition: var(--transition);
            z-index: 50;
        }
        
        .share-btn:hover {
            transform: scale(1.1) rotate(15deg);
        }
        
        /* Long press menu */
        .context-menu {
            position: fixed;
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 8px;
            box-shadow: var(--shadow);
            z-index: 1000;
            display: none;
        }
        
        .context-menu.active {
            display: block;
        }
        
        .context-menu button {
            display: block;
            width: 100%;
            padding: 10px 16px;
            border: none;
            background: none;
            color: var(--text-primary);
            font-size: 14px;
            text-align: left;
            cursor: pointer;
            border-radius: 8px;
        }
        
        .context-menu button:hover {
            background: var(--bg-tertiary);
        }
        
        /* Swipe to reply */
        .swipe-hint {
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 16px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .message.user:hover .swipe-hint {
            opacity: 1;
        }
        
        /* New message indicator */
        .new-message-indicator {
            text-align: center;
            padding: 8px;
            color: var(--primary);
            font-size: 12px;
            cursor: pointer;
            display: none;
        }
        
        .new-message-indicator.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="phone-notch"></div>
        
        <!-- Status Bar -->
        <div class="status-bar">
            <div class="time" id="statusTime">9:41</div>
            <div class="connection-status" id="connectionStatus">
                <div class="dot"></div>
                <span>Connected</span>
            </div>
            <div class="icons">
                <span>📶</span>
                <span>🔋</span>
            </div>
        </div>
        
        <div class="header">
            <div class="header-left">
                <div class="avatar">
                    🎌
                    <div class="avatar-ring"></div>
                </div>
                <div class="agent-info">
                    <span class="agent-name">Otaku Sensei</span>
                    <span class="agent-status">
                        <span class="online-dot"></span>
                        Online
                    </span>
                </div>
            </div>
            <div class="header-actions">
                <button class="header-btn" onclick="toggleMenu()" title="Menu">☰</button>
                <button class="header-btn" onclick="showSettings()" title="Settings">⚙</button>
                <button class="header-btn" onclick="makeCall()" title="Voice Call">📞</button>
            </div>
        </div>
        
        <div class="nav-tabs">
            <div class="nav-tab active" data-tab="chat" onclick="switchTab('chat')">
                <span>💬</span>
                Chat
            </div>
            <div class="nav-tab" data-tab="discover" onclick="switchTab('discover')">
                <span>🔍</span>
                Discover
            </div>
            <div class="nav-tab" data-tab="favorites" onclick="switchTab('favorites')">
                <span>❤️</span>
                Favorites
            </div>
            <div class="nav-tab" data-tab="season" onclick="switchTab('season')">
                <span>📺</span>
                Season
            </div>
            <div class="nav-tab" data-tab="trends" onclick="switchTab('trends')">
                <span>🔥</span>
                Trends
            </div>
        </div>
        
        <div class="panel active" id="panel-chat">
            <div class="panel-title">Quick Actions</div>
            <div class="quick-actions">
                <button class="quick-btn primary" onclick="sendQuick('Recommend me an anime')">
                    🎬 Recommend
                </button>
                <button class="quick-btn" onclick="sendQuick('Show me trending anime')">
                    🔥 Trending
                </button>
                <button class="quick-btn" onclick="sendQuick('What\'s airing this season')">
                    📺 Airing Now
                </button>
                <button class="quick-btn" onclick="sendQuick('Find similar to my favorites')">
                    ⚔️ Similar
                </button>
            </div>
        </div>
        
        <div class="panel" id="panel-discover">
            <div class="panel-title">Search by Vibe</div>
            <div class="quick-actions">
                <button class="quick-btn" onclick="discoverBy('blonde protagonist')">👱 Blonde Hero</button>
                <button class="quick-btn" onclick="discoverBy('dark fantasy revenge')">⚔️ Dark Revenge</button>
                <button class="quick-btn" onclick="discoverBy('school romance comedy')">💕 School Romance</button>
                <button class="quick-btn" onclick="discoverBy('psychological thriller')">🧠 Thriller</button>
                <button class="quick-btn" onclick="discoverBy('slice of life')">🌸 Slice of Life</button>
                <button class="quick-btn" onclick="discoverBy('mecha sci-fi')">🤖 Mecha</button>
            </div>
        </div>
        
        <div class="panel" id="panel-favorites">
            <div class="panel-title">Share Your Taste</div>
            <div class="quick-actions">
                <button class="quick-btn primary" onclick="sendQuick('Add to my favorites')">
                    ➕ Add Favorites
                </button>
                <button class="quick-btn" onclick="sendQuick('Recommend based on my list')">
                    🎯 Personalized
                </button>
                <button class="quick-btn" onclick="sendQuick('What should I watch next')">
                    🤔 What Next?
                </button>
                <button class="quick-btn" onclick="sendQuick('Show my top rated')">
                    ⭐ My Ratings
                </button>
            </div>
        </div>
        
        <div class="panel" id="panel-season">
            <div class="panel-title">Seasonal Charts</div>
            <div class="quick-actions" id="seasonButtons">
                <!-- Dynamic season buttons will be inserted here -->
            </div>
        </div>
        
        <div class="panel" id="panel-trends">
            <div class="panel-title">Hot Right Now</div>
            <div class="quick-actions">
                <button class="quick-btn primary" onclick="sendQuick('Top 10 trending')">
                    🏆 Top 10
                </button>
                <button class="quick-btn" onclick="sendQuick('Most popular this month')">
                    📈 Popular
                </button>
                <button class="quick-btn" onclick="sendQuick('Highly rated anime')">
                    ⭐ Top Rated
                </button>
                <button class="quick-btn" onclick="sendQuick('New releases')">
                    🆕 New
                </button>
            </div>
        </div>
        
        <div class="chat-area" id="chatArea">
            <div class="message agent" id="welcomeMessage">
                <!-- Dynamic welcome message will be inserted here -->
            </div>
        </div>
        
        <div class="typing" id="typing">
            <span></span><span></span><span></span>
        </div>
        
        <div class="input-area">
            <div class="quick-reply" id="quickReplies">
                <button class="quick-reply-btn" onclick="useQuickReply('Recommend me something')">Recommend</button>
                <button class="quick-reply-btn" onclick="useQuickReply('Show trending')">Trending</button>
                <button class="quick-reply-btn" onclick="useQuickReply('Similar to AoT')">Similar to AoT</button>
                <button class="quick-reply-btn" onclick="useQuickReply('What\'s new?')">What's new?</button>
            </div>
            
            <div class="input-wrapper">
                <button class="input-btn" onclick="attachFile()">📎</button>
                <button class="input-btn" onclick="toggleEmojiPicker()">😊</button>
                <input type="text" id="messageInput" placeholder="Describe what you want..." onkeypress="if(event.key==='Enter')sendMessage()">
                <button class="input-btn" onclick="toggleVoice()">🎤</button>
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:5000/api';
        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const typing = document.getElementById('typing');
        const quickReplies = document.getElementById('quickReplies');
        
        let currentTab = 'chat';
        let isTyping = false;
        let authToken = null;
        
        // Auto-connect on load
        window.onload = async function() {
            await checkHealth();
            loadTrending();
            initSeasonButtons();
            initWelcomeMessage();
        };
        
        function initWelcomeMessage() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            
            let currentSeason;
            if (month >= 1 && month <= 3) currentSeason = 'winter';
            else if (month >= 4 && month <= 6) currentSeason = 'spring';
            else if (month >= 7 && month <= 9) currentSeason = 'summer';
            else currentSeason = 'fall';
            
            const emoji = { winter: '❄️', spring: '🌸', summer: '☀️', fall: '🍂' };
            
            const welcomeDiv = document.getElementById('welcomeMessage');
            welcomeDiv.innerHTML = `
                🎌 Hello, fellow enthusiast! I'm your Anime & Manga Guide!
                
                Currently tracking: ${emoji[currentSeason]} ${currentSeason.charAt(0).toUpperCase() + currentSeason.slice(1)} ${year}
                
                I can help you discover amazing anime through:
                • 💬 Natural conversation
                • 🔍 Vague descriptions ("dark revenge saga")
                • 📚 Your favorites (I'll find similar ones)
                • 📅 Seasonal charts & trending
                
                What would you like to explore?
                <div class="time">Just now</div>
            `;
        }
        
        function initSeasonButtons() {
            const container = document.getElementById('seasonButtons');
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            
            let currentSeason, prevSeason, prevYear, nextSeason, nextYear;
            
            if (month >= 1 && month <= 3) {
                currentSeason = 'winter';
                prevSeason = 'fall';
                prevYear = year - 1;
                nextSeason = 'spring';
                nextYear = year;
            } else if (month >= 4 && month <= 6) {
                currentSeason = 'spring';
                prevSeason = 'winter';
                prevYear = year;
                nextSeason = 'summer';
                nextYear = year;
            } else if (month >= 7 && month <= 9) {
                currentSeason = 'summer';
                prevSeason = 'spring';
                prevYear = year;
                nextSeason = 'fall';
                nextYear = year;
            } else {
                currentSeason = 'fall';
                prevSeason = 'summer';
                prevYear = year;
                nextSeason = 'winter';
                nextYear = year + 1;
            }
            
            const seasonEmoji = { winter: '❄️', spring: '🌸', summer: '☀️', fall: '🍂' };
            const seasonName = s => s.charAt(0).toUpperCase() + s.slice(1);
            
            const buttons = [
                { label: `⭐ ${seasonName(currentSeason)} ${year}`, text: `${currentSeason} ${year} anime`, primary: true },
                { label: `${seasonEmoji[prevSeason]} ${seasonName(prevSeason)} ${prevYear}`, text: `${prevSeason} ${prevYear} anime` },
                { label: `${seasonEmoji[nextSeason]} ${seasonName(nextSeason)} ${nextYear}`, text: `${nextSeason} ${nextYear} anime` },
                { label: '🔮 Upcoming', text: 'upcoming anime' }
            ];
            
            container.innerHTML = buttons.map(b => 
                `<button class="quick-btn ${b.primary ? 'primary' : ''}" onclick="sendQuick('${b.text}')">${b.label}</button>`
            ).join('');
        }
        
        async function checkHealth() {
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                console.log('API Status:', data.status);
            } catch (e) {
                console.log('API not running - using offline mode');
            }
        }
        
        async function loadTrending() {
            try {
                const response = await fetch(`${API_BASE}/trends?type=anime&limit=5`);
                const data = await response.json();
                if (data.success && data.data) {
                    updateTrendingDisplay(data.data);
                }
            } catch (e) {
                console.log('Using offline trending data');
            }
        }
        
        function updateTrendingDisplay(animeList) {
            const trendingBtn = document.querySelector('[onclick*="trending"]');
            if (trendingBtn && animeList.length > 0) {
                const titles = animeList.slice(0, 3).map(a => a.title).join(', ');
                trendingBtn.setAttribute('data-trending', titles);
            }
        }

        function switchTab(tabName) {
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.dataset.tab === tabName) tab.classList.add('active');
            });
            
            document.querySelectorAll('.panel').forEach(panel => {
                panel.classList.remove('active');
            });
            document.getElementById('panel-' + tabName).classList.add('active');
            
            currentTab = tabName;
            
            // Load tab-specific content
            if (tabName === 'trends') loadTrendsData();
            if (tabName === 'season') loadSeasonData();
        }
        
        async function loadTrendsData() {
            try {
                const response = await fetch(`${API_BASE}/trends?type=anime&limit=10`);
                const data = await response.json();
                if (data.success) {
                    console.log('Trends loaded:', data.data?.length || 0, 'items');
                }
            } catch (e) {
                console.log('Failed to load trends');
            }
        }
        
        async function loadSeasonData() {
            try {
                const response = await fetch(`${API_BASE}/season/current`);
                const data = await response.json();
                if (data.success) {
                    console.log('Season data loaded');
                }
            } catch (e) {
                console.log('Failed to load season data');
            }
        }
        
        function sendQuick(text) {
            messageInput.value = text;
            sendMessage();
        }
        
        function discoverBy(vibe) {
            messageInput.value = "Find anime with " + vibe;
            sendMessage();
        }
        
        function useQuickReply(text) {
            messageInput.value = text;
            sendMessage();
        }
        
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || isTyping) return;
            
            addMessage(text, 'user');
            messageInput.value = '';
            showTyping();
            
            try {
                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...(authToken ? { 'Authorization': `Bearer ${authToken}` } : {})
                    },
                    body: JSON.stringify({
                        message: text,
                        language: 'en'
                    })
                });
                
                const data = await response.json();
                hideTyping();
                
                if (data.success) {
                    addMessage(data.data.response, 'agent');
                    updateQuickReplies(data.data);
                } else {
                    // Fallback to local responses
                    hideTyping();
                    const fallback = generateResponse(text);
                    addMessage(fallback, 'agent');
                }
            } catch (e) {
                // API not available, use fallback
                hideTyping();
                const fallback = generateResponse(text);
                addMessage(fallback, 'agent');
            }
        }
        
        function updateQuickReplies(data) {
            if (data && data.suggestions) {
                quickReplies.innerHTML = '';
                data.suggestions.forEach(reply => {
                    const btn = document.createElement('button');
                    btn.className = 'quick-reply-btn';
                    btn.textContent = reply;
                    btn.onclick = () => useQuickReply(reply);
                    quickReplies.appendChild(btn);
                });
            }
        }
        
        function addMessage(text, type) {
            const isUser = type === 'user';
            const status = isUser ? '<span class="message-status">✓✓</span>' : '';
            const actions = isUser ? `
                <div class="message-actions">
                    <button class="message-action-btn" onclick="copyMessage()" title="Copy">📋</button>
                    <button class="message-action-btn" onclick="replyToMessage()" title="Reply">↩️</button>
                </div>
            ` : '';
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + type;
            messageDiv.oncontextmenu = (e) => showContextMenu(e, type);
            messageDiv.innerHTML = actions + text + '<div class="time">' + getTime() + '</div>' + status;
            
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function getTime() {
            const now = new Date();
            return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        
        function showTyping() {
            isTyping = true;
            typing.classList.add('active');
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function hideTyping() {
            isTyping = false;
            typing.classList.remove('active');
        }
        
        function toggleMenu() {
            showModal('Menu', '<div class="menu-options"><button onclick="showAuthModal()">🔐 Login</button><button onclick="loadPresets()">📋 Presets</button><button onclick="loadHistory()">📜 History</button></div>');
        }
        
        async function showSettings() {
            showModal('Settings', '<div class="settings-options"><button onclick="setLanguage(\'en\')">English</button><button onclick="setLanguage(\'ja\')">日本語</button><button onclick="setLanguage(\'ru\')">Русский</button></div>');
        }
        
        function showModal(title, content) {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `<div class="modal-content"><h3>${title}</h3>${content}<button onclick="this.parentElement.parentElement.remove()" class="close-modal">Close</button></div>`;
            document.body.appendChild(modal);
        }
        
        async function setLanguage(lang) {
            try {
                await fetch(`${API_BASE}/language`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ language: lang })
                });
                addMessage(`Language changed to ${lang}`, 'agent');
            } catch (e) {
                console.log('Language API not available');
            }
        }
        
        function attachFile() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                addMessage('📎 File attached: ' + e.target.files[0]?.name, 'user');
            };
            input.click();
        }
        
        function toggleVoice() {
            if (!('webkitSpeechRecognition' in window)) {
                alert('Voice input not supported in this browser');
                return;
            }
            
            const recognition = new webkitSpeechRecognition();
            recognition.onresult = (event) => {
                messageInput.value = event.results[0][0].transcript;
            };
            recognition.start();
        }
        
        // Time-aware data
        let currentSeasonData = {
            season: 'spring',
            year: 2026,
            anime: []
        };
        
        function getCurrentSeasonInfo() {
            const now = new Date();
            const month = now.getMonth() + 1;
            const year = now.getFullYear();
            
            if (month >= 1 && month <= 3) return { season: 'winter', year };
            if (month >= 4 && month <= 6) return { season: 'spring', year };
            if (month >= 7 && month <= 9) return { season: 'summer', year };
            return { season: 'fall', year };
        }
        
        function getSeasonEmoji(season) {
            const emojis = { winter: '❄️', spring: '🌸', summer: '☀️', fall: '🍂' };
            return emojis[season] || '📺';
        }
        
        function formatSeasonName(season, year) {
            return `${getSeasonEmoji(season)} ${season.charAt(0).toUpperCase() + season.slice(1)} ${year}`;
        }
        
        currentSeasonData = getCurrentSeasonInfo();
        
        // Load real data from API
        async function loadSeasonData() {
            const { season, year } = currentSeasonData;
            try {
                const response = await fetch(`${API_BASE}/airing/anichart?season=${season}&year=${year}&per_page=10`);
                const data = await response.json();
                if (data.success && data.data) {
                    currentSeasonData.anime = data.data.slice(0, 10);
                    return currentSeasonData.anime;
                }
            } catch (e) {
                console.log('Using fallback season data');
            }
            return null;
        }
        
        async function loadTrendingData() {
            try {
                const response = await fetch(`${API_BASE}/trends?type=anime&limit=10`);
                const data = await response.json();
                if (data.success && data.data) {
                    return data.data;
                }
            } catch (e) {}
            return null;
        }
        
        // Fallback responses when API is not available - TIME AWARE
        function generateResponse(message) {
            const msg = message.toLowerCase();
            const { season, year } = currentSeasonData;
            const seasonName = formatSeasonName(season, year);
            
            if (msg.includes('recommend')) {
                return `🎯 To give you the best recommendations for ${seasonName}, tell me:\n\n• What genres do you enjoy?\n• Any anime you loved recently?\n• Preferred length?\n\nOr describe what you want - even vaguely!`;
            }
            
            if (msg.includes('trending') || msg.includes('popular')) {
                return `🔥 **TRENDING NOW - ${seasonName}**\n\nFetching latest trends from the anime community...\n\nWant me to show you what's hot right now?`;
            }
            
            if (msg.includes('season') || msg.includes('airing') || msg.includes('this season')) {
                return `📺 **CURRENT SEASON: ${seasonName}**\n\nThe anime calendar is packed right now! Here are highlights:\n\n• New series premiering this season\n• Returning sequels\n• Hidden gems\n\nWhich interests you?`;
            }
            
            if (msg.includes('best') || msg.includes('top 10') || msg.includes('all time') || msg.includes('greatest')) {
                return `🏆 **TOP ANIME OF ALL TIME:**\n\nThese legendary series have stood the test of time:\n\n1. **Fullmetal Alchemist: Brotherhood** - The perfect anime\n2. **Attack on Titan** - The greatest story\n3. **Steins;Gate** - Time travel done right\n4. **Hunter x Hunter** - Masterpiece adventure\n5. **Code Geass** - Strategic genius\n\nWant me to show you more or explain why these are considered the best?`;
            }
            
            if (msg.includes('classic') || msg.includes('1990s') || msg.includes('199') || msg.includes('old')) {
                return `📼 **CLASSIC ANIME:**\n\nThe golden era of anime!\n\n• **Cowboy Bebop (1998)** - Space jazz masterpiece\n• **Neon Genesis Evangelion (1995)** - Mecha redefined\n• **Berserk (1997)** - Dark fantasy king\n• **Dragon Ball Z** - The shonen blueprint\n• **Sailor Moon** - Magical girl icon\n\nWhich decade interests you?`;
            }
            
            if (msg.includes('new') || msg.includes('202') || msg.includes('recent')) {
                return `🆕 **RECENT RELEASES:**\n\nI'm tracking the latest and greatest! For ${seasonName} ${year}, we've got amazing new series dropping. Ask me what's trending or check the current season for all the new shows!`;
            }
            
            if (msg.includes('winter') || msg.includes('spring') || msg.includes('summer') || msg.includes('fall')) {
                const seasons = { winter: '❄️', spring: '🌸', summer: '☀️', fall: '🍂' };
                for (const [s, emoji] of Object.entries(seasons)) {
                    if (msg.includes(s)) {
                        return `${emoji} **${s.charAt(0).toUpperCase() + s.slice(1)} Season**\n\nFor ${s} ${year}, check out the seasonal charts! Ask me about "current season" for what's airing now.`;
                    }
                }
            }
            
            if (msg.includes('similar') || msg.includes('like')) {
                return `⚔️ Looking for similar titles?\n\nJust tell me which anime you loved and I'll find others with:\n✨ Similar themes\n🎭 Comparable characters\n🌍 Matching vibe\n\nWho was your favorite?`;
            }
            
            if (msg.includes('blonde')) {
                return `👱 **Anime with Blonde Protagonists:**\n\n1. **Yusuke Godai (GTO)** - Classic 90s!\n2. **Holo (Spice and Wolf)** - Beautiful wolf deity\n3. **Luffy (One Piece)** - Iconic rubber pirate\n4. **Hikaru (Fruits Basket)** - Bubbly blonde\n5. **Revy (Black Lagoon)** - Tough pirate\n\nWant more specific?`;
            }
            
            if (msg.includes('dark') && msg.includes('fantasy')) {
                return `🌑 **DARK FANTASY:**\n\n1. **Berserk (1997)** - The ULTIMATE\n2. **Vinland Saga** - Viking revenge\n3. **Attack on Titan** - Dark, gritty\n4. **Demon Slayer** - Beautiful\n5. **Claymore** - Demon-hunters\n\nThese will consume your soul! 🔥`;
            }
            
            return `🎌 Great question!\n\nI'm your guide to the anime universe:\n\n🔍 **Smart Search** - Describe what you want!\n📚 **Your Favorites** - Tell me shows you loved\n📅 **Seasonal Charts** - ${seasonName} is current!\n💬 **Chat** - Discuss & get facts\n\nWhat are you in the mood for? 🌟`;
        }
        
        async function showAuthModal() {
            showModal('Authentication', `
                <div class="auth-form">
                    <input type="text" id="username" placeholder="Username">
                    <input type="password" id="password" placeholder="Password">
                    <button onclick="login()">Login</button>
                    <button onclick="register()">Register</button>
                </div>
            `);
        }
        
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (data.success) {
                    authToken = data.data.token;
                    addMessage('✅ Logged in successfully!', 'agent');
                    document.querySelector('.modal-overlay')?.remove();
                } else {
                    alert(data.message);
                }
            } catch (e) {
                alert('Login failed - API not available');
            }
        }
        
        async function register() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email: username + '@test.com', password })
                });
                const data = await response.json();
                if (data.success) {
                    addMessage('✅ Account created! Please login.', 'agent');
                } else {
                    alert(data.message);
                }
            } catch (e) {
                alert('Registration failed - API not available');
            }
        }
        
        // Update status bar time
        function updateStatusTime() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const timeEl = document.getElementById('statusTime');
            if (timeEl) timeEl.textContent = `${hours}:${minutes}`;
        }
        setInterval(updateStatusTime, 1000);
        updateStatusTime();
        
        // Connection status check
        async function updateConnectionStatus() {
            const statusEl = document.getElementById('connectionStatus');
            try {
                await fetch(`${API_BASE}/health`, { method: 'HEAD' });
                statusEl.classList.remove('offline');
                statusEl.querySelector('span').textContent = 'Connected';
            } catch (e) {
                statusEl.classList.add('offline');
                statusEl.querySelector('span').textContent = 'Offline';
            }
        }
        setInterval(updateConnectionStatus, 5000);
        
        // Add emoji picker
        function toggleEmojiPicker() {
            const picker = document.getElementById('emojiPicker');
            picker.classList.toggle('active');
        }
        
        function insertEmoji(emoji) {
            messageInput.value += emoji;
            messageInput.focus();
            document.getElementById('emojiPicker').classList.remove('active');
        }
        
        // Context menu for messages
        function showContextMenu(e, messageType) {
            e.preventDefault();
            const menu = document.getElementById('contextMenu');
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
            menu.classList.add('active');
            menu.dataset.messageType = messageType;
            
            document.addEventListener('click', hideContextMenu);
        }
        
        function hideContextMenu() {
            document.getElementById('contextMenu').classList.remove('active');
            document.removeEventListener('click', hideContextMenu);
        }
        
        function copyMessage() {
            const menu = document.getElementById('contextMenu');
            const lastMsg = chatArea.lastElementChild;
            if (lastMsg) {
                navigator.clipboard.writeText(lastMsg.textContent);
                addMessage('📋 Copied to clipboard!', 'agent');
            }
            hideContextMenu();
        }
        
        function replyToMessage() {
            const menu = document.getElementById('contextMenu');
            const lastMsg = chatArea.lastElementChild;
            if (lastMsg && lastMsg.classList.contains('agent')) {
                messageInput.value = 'Regarding: ' + lastMsg.textContent.substring(0, 50) + '... ';
                messageInput.focus();
            }
            hideContextMenu();
        }
        
        function shareMessage() {
            const lastMsg = chatArea.lastElementChild;
            if (lastMsg) {
                if (navigator.share) {
                    navigator.share({ text: lastMsg.textContent });
                } else {
                    navigator.clipboard.writeText(lastMsg.textContent);
                    addMessage('📤 Share link copied!', 'agent');
                }
            }
            hideContextMenu();
        }
        
        // Load history
        async function loadHistory() {
            if (!authToken) {
                showModal('History', '<p>Please login to view history</p>');
                return;
            }
            try {
                const response = await fetch(`${API_BASE}/history`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await response.json();
                if (data.success) {
                    showModal('Watch History', '<p>Your watch history will appear here</p>');
                }
            } catch (e) {
                showModal('History', '<p>No history available</p>');
            }
        }
        
        // Load presets
        async function loadPresets() {
            showModal('Presets', `
                <div class="preset-list">
                    <button onclick="loadPreset('anime-of-week')">🎬 Anime of Week</button>
                    <button onclick="loadPreset('anime-of-year')">🏆 Anime of Year</button>
                    <button onclick="loadPreset('seasonal-gems')">💎 Seasonal Gems</button>
                    <button onclick="loadPreset('underrated')">🌟 Underrated</button>
                    <button onclick="loadPreset('beginner-friendly')">👶 Beginner Friendly</button>
                </div>
            `);
        }
        
        async function loadPreset(presetName) {
            try {
                const response = await fetch(`${API_BASE}/presets/${presetName}`);
                const data = await response.json();
                if (data.success) {
                    addMessage(data.message || 'Here are some recommendations!', 'agent');
                    document.querySelector('.modal-overlay')?.remove();
                }
            } catch (e) {
                addMessage('🎯 Here are some great picks for you!', 'agent');
                document.querySelector('.modal-overlay')?.remove();
            }
        }
        
        // Make call (placeholder)
        function makeCall() {
            showModal('Voice Call', '<p>Voice calling feature coming soon!</p>');
        }
        
        // Search functionality
        async function searchAnime(query) {
            try {
                const response = await fetch(`${API_BASE}/search/anime?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                if (data.success && data.data) {
                    return data.data;
                }
            } catch (e) {}
            return [];
        }
        
        // Scroll detection for new messages
        let lastScrollHeight = 0;
        chatArea.addEventListener('scroll', function() {
            const atBottom = chatArea.scrollHeight - chatArea.scrollTop - chatArea.clientHeight < 50;
            if (!atBottom && chatArea.scrollHeight > lastScrollHeight) {
                document.getElementById('newMessageIndicator').classList.add('active');
            }
            lastScrollHeight = chatArea.scrollHeight;
        });
        
        function scrollToBottom() {
            chatArea.scrollTop = chatArea.scrollHeight;
            document.getElementById('newMessageIndicator').classList.remove('active');
        }
    </script>
    
    <!-- Emoji Picker -->
    <div class="emoji-picker" id="emojiPicker">
        <button onclick="insertEmoji('🎌')">🎌</button>
        <button onclick="insertEmoji('🔥')">🔥</button>
        <button onclick="insertEmoji('⭐')">⭐</button>
        <button onclick="insertEmoji('💕')">💕</button>
        <button onclick="insertEmoji('⚔️')">⚔️</button>
        <button onclick="insertEmoji('🎬')">🎬</button>
        <button onclick="insertEmoji('📺')">📺</button>
        <button onclick="insertEmoji('👱')">👱</button>
        <button onclick="insertEmoji('🧠')">🧠</button>
        <button onclick="insertEmoji('🌸')">🌸</button>
        <button onclick="insertEmoji('🤖')">🤖</button>
        <button onclick="insertEmoji('❄️')">❄️</button>
    </div>
    
    <!-- Context Menu -->
    <div class="context-menu" id="contextMenu">
        <button onclick="replyToMessage()">↩️ Reply</button>
        <button onclick="copyMessage()">📋 Copy</button>
        <button onclick="shareMessage()">📤 Share</button>
    </div>
    
    <!-- New Message Indicator -->
    <div class="new-message-indicator" id="newMessageIndicator" onclick="scrollToBottom()">
        ↓ New messages
    </div>
    
    <!-- Share FAB -->
    <button class="share-btn" onclick="showModal('Share', '<p>Share functionality coming soon!</p>')" title="Share">➕</button>
    
    <style>
